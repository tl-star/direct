<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Khalid Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #151b22;
            color: #c9d1d9;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: #1e2630;
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            color: #f0e6d0;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-form {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .login-form.active {
            display: flex;
        }
        .login-form input {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 0.95rem;
            outline: none;
        }
        .login-form input:focus {
            border-color: #58a6ff;
        }
        .login-form button {
            padding: 0.7rem;
            border-radius: 10px;
            border: none;
            background: #58a6ff;
            color: #0d1117;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-form button:hover {
            background: #4a8fd8;
        }
        .login-error {
            color: #f85149;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .admin-panel {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }
        .admin-panel.active {
            display: flex;
        }

        .panel-section {
            background: #0d1117;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .panel-section h2 {
            color: #f0e6d0;
            font-size: 1.15rem;
            margin-bottom: 0.8rem;
        }
        .panel-section .field {
            margin-bottom: 0.8rem;
        }
        .panel-section label {
            display: block;
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }
        .panel-section input,
        .panel-section textarea {
            width: 100%;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #1e2630;
            color: #c9d1d9;
            font-size: 0.9rem;
            outline: none;
        }
        .panel-section input:focus,
        .panel-section textarea:focus {
            border-color: #58a6ff;
        }
        .panel-section textarea {
            min-height: 60px;
            resize: vertical;
        }
        .panel-section .repo-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .panel-section .repo-item input {
            flex: 1;
            min-width: 180px;
        }
        .panel-section .repo-item .remove-repo {
            background: #f85149;
            border: none;
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .panel-section .repo-item .remove-repo:hover {
            background: #d43a33;
        }

        .btn-save {
            padding: 0.6rem 1.8rem;
            border-radius: 10px;
            border: none;
            background: #25D366;
            color: #0d1117;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-save:hover {
            background: #1ebe5c;
        }

        .btn-add {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: none;
            background: #58a6ff;
            color: #0d1117;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .btn-add:hover {
            background: #4a8fd8;
        }

        .btn-danger {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: none;
            background: #f0883e;
            color: #0d1117;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .btn-danger:hover {
            background: #d97a33;
        }

        .btn-logout {
            padding: 0.6rem 1.8rem;
            border-radius: 10px;
            border: 1px solid #f85149;
            background: transparent;
            color: #f85149;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-logout:hover {
            background: #f85149;
            color: #0d1117;
        }

        .status-msg {
            padding: 0.6rem;
            border-radius: 8px;
            margin-top: 0.8rem;
            display: none;
            font-size: 0.9rem;
        }
        .status-msg.success {
            display: block;
            background: #0d1f1a;
            color: #25D366;
            border: 1px solid #25D366;
        }
        .status-msg.error {
            display: block;
            background: #1f0d0d;
            color: #f85149;
            border: 1px solid #f85149;
        }

        .back-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #f0883e;
        }

        .button-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .gallery-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.6rem;
            margin: 0.8rem 0;
        }
        .gallery-preview img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .gallery-preview .empty {
            color: #8b949e;
            font-size: 0.85rem;
            grid-column: 1 / -1;
            text-align: center;
            padding: 0.5rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            .panel-section {
                padding: 0.8rem 1rem;
            }
            .button-group {
                flex-direction: column;
            }
            .repo-item {
                flex-direction: column;
                align-items: stretch !important;
            }
            .repo-item input {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚙️ Admin Panel</h1>
        <p class="subtitle">Manage your portfolio content</p>

        <!-- Login Form -->
        <div class="login-form active" id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="handleLogin()">Login</button>
            <p class="login-error" id="loginError">Invalid username or password</p>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">

            <!-- Social Media Links -->
            <div class="panel-section">
                <h2>🔗 Social Media Links</h2>
                <div class="field">
                    <label>GitHub URLs (Multiple)</label>
                    <div id="repoList">
                        <div class="repo-item">
                            <input type="url" class="repo-input" value="https://github.com/tl-star" />
                            <button class="remove-repo" onclick="removeRepo(this)">✖</button>
                        </div>
                        <div class="repo-item">
                            <input type="url" class="repo-input" value="https://github.com/tl-star/direct" />
                            <button class="remove-repo" onclick="removeRepo(this)">✖</button>
                        </div>
                    </div>
                    <button class="btn-add" onclick="addRepoField()">➕ Add Repository</button>
                </div>
                <div class="field">
                    <label>LinkedIn URL</label>
                    <input type="url" id="linkedinUrl" value="https://linkedin.com/in/khalid-muhammad-5153b8296" />
                </div>
                <div class="field">
                    <label>WhatsApp URL</label>
                    <input type="url" id="whatsappUrl" value="https://wa.me/923152820296" />
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="emailUrl" value="mailto:telelenker@gmail.com" />
                </div>
                <button class="btn-save" onclick="saveSocialLinks()">💾 Save Social Links</button>
            </div>

            <!-- Gallery -->
            <div class="panel-section">
                <h2>📸 Gallery</h2>
                <div class="gallery-preview" id="galleryPreview">
                    <div class="empty">No images added yet</div>
                </div>
                <div class="field">
                    <label>Add Image URL</label>
                    <input type="url" id="newImageUrl" placeholder="https://example.com/image.jpg" />
                </div>
                <div class="button-group">
                    <button class="btn-save" onclick="addGalleryImage()">➕ Add Image</button>
                    <button class="btn-danger" onclick="removeLastImage()">✖️ Remove Last</button>
                </div>
                <div id="galleryStatus" class="status-msg"></div>
            </div>

            <!-- Projects -->
            <div class="panel-section">
                <h2>📂 Projects</h2>
                <div class="field">
                    <label>Project Title</label>
                    <input type="text" id="projTitle" placeholder="e.g., LPR Automated Parking" />
                </div>
                <div class="field">
                    <label>Project Description</label>
                    <textarea id="projDesc" placeholder="Describe your project..."></textarea>
                </div>
                <div class="field">
                    <label>Technologies (comma separated)</label>
                    <input type="text" id="projTags" placeholder="e.g., Python, OpenCV, IoT" />
                </div>
                <div class="button-group">
                    <button class="btn-save" onclick="addProject()">➕ Add Project</button>
                    <button class="btn-danger" onclick="clearProjects()">🗑️ Clear All</button>
                </div>
                <div id="projectStatus" class="status-msg"></div>
            </div>

            <!-- Logout -->
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem;">
                <a href="https://tl-star.github.io/direct/" class="back-link">← Back to Portfolio</a>
                <button class="btn-logout" onclick="handleLogout()">🚪 Logout</button>
            </div>

        </div>
    </div>

    <script>
        const ADMIN_USERNAME = 'kgf292900';
        const ADMIN_PASSWORD = 'kgf292900';

        let galleryImages = [];
        let projects = [];

        function handleLogin() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('adminPanel').classList.add('active');
                loadAdminData();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function handleLogout() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        async function loadAdminData() {
            try {
                const r = await fetch('data.json');
                if (r.ok) {
                    const d = await r.json();
                    galleryImages = d.gallery || [];
                    projects = d.projects || [];
                    renderGalleryPreview();
                }
            } catch (e) { galleryImages = [];
                projects = [];
                renderGalleryPreview(); }
        }

        function renderGalleryPreview() {
            const c = document.getElementById('galleryPreview');
            if (galleryImages.length === 0) { c.innerHTML = '<div class="empty">No images added yet</div>'; return; }
            c.innerHTML = galleryImages.map(img =>
                `<img src="${img}" alt="Gallery" loading="lazy" onerror="this.src='https://via.placeholder.com/200x150/1e2630/58a6ff?text=Error'" />`
                ).join('');
        }

        function addGalleryImage() {
            const url = document.getElementById('newImageUrl').value.trim();
            if (!url) { showStatus('galleryStatus', 'Please enter an image URL', 'error'); return; }
            galleryImages.push(url);
            document.getElementById('newImageUrl').value = '';
            renderGalleryPreview();
            showStatus('galleryStatus', '✅ Image added!', 'success');
        }

        function removeLastImage() {
            if (galleryImages.length === 0) { showStatus('galleryStatus', 'No images to remove', 'error'); return; }
            galleryImages.pop();
            renderGalleryPreview();
            showStatus('galleryStatus', '✅ Last image removed', 'success');
        }

        // ===== REPOSITORY FUNCTIONS =====
        function addRepoField() {
            const list = document.getElementById('repoList');
            const div = document.createElement('div');
            div.className = 'repo-item';
            div.innerHTML = `
                    <input type="url" class="repo-input" value="" placeholder="https://github.com/username/repo" />
                    <button class="remove-repo" onclick="removeRepo(this)">✖</button>
                `;
            list.appendChild(div);
        }

        function removeRepo(btn) {
            const list = document.getElementById('repoList');
            if (list.children.length <= 1) {
                showStatus('galleryStatus', 'You need at least one repository', 'error');
                return;
            }
            btn.parentElement.remove();
        }

        function saveSocialLinks() {
            const repos = [];
            document.querySelectorAll('.repo-input').forEach(inp => {
                if (inp.value.trim()) repos.push(inp.value.trim());
            });

            const linkedin = document.getElementById('linkedinUrl').value;
            const whatsapp = document.getElementById('whatsappUrl').value;
            const email = document.getElementById('emailUrl').value;

            // Save to localStorage for now (simulated)
            const data = {
                repos: repos,
                linkedin: linkedin,
                whatsapp: whatsapp,
                email: email
            };
            localStorage.setItem('socialData', JSON.stringify(data));

            // Also update the main page buttons (simulated)
            showStatus('galleryStatus', '✅ Social links saved! (Refresh portfolio to see changes)', 'success');
        }

        // ===== PROJECT FUNCTIONS =====
        function addProject() {
            const title = document.getElementById('projTitle').value.trim();
            const desc = document.getElementById('projDesc').value.trim();
            const tags = document.getElementById('projTags').value.split(',').map(t => t.trim()).filter(t => t);

            if (!title || !desc) { showStatus('projectStatus', 'Please fill title and description', 'error'); return; }

            projects.push({ title, description: desc, tags });
            document.getElementById('projTitle').value = '';
            document.getElementById('projDesc').value = '';
            document.getElementById('projTags').value = '';
            showStatus('projectStatus', '✅ Project added!', 'success');
        }

        function clearProjects() {
            if (confirm('Clear all projects?')) { projects = [];
                showStatus('projectStatus', '✅ All projects cleared', 'success'); }
        }

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status-msg ' + type;
            setTimeout(() => { el.className = 'status-msg'; }, 4000);
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (form.classList.contains('active')) handleLogin();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            // Load saved repos from localStorage if exists
            const saved = localStorage.getItem('socialData');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    if (d.repos && d.repos.length > 0) {
                        const list = document.getElementById('repoList');
                        list.innerHTML = '';
                        d.repos.forEach((url, i) => {
                            const div = document.createElement('div');
                            div.className = 'repo-item';
                            div.innerHTML = `
                                    <input type="url" class="repo-input" value="${url}" />
                                    <button class="remove-repo" onclick="removeRepo(this)">✖</button>
                                `;
                            list.appendChild(div);
                        });
                    }
                    if (d.linkedin) document.getElementById('linkedinUrl').value = d.linkedin;
                    if (d.whatsapp) document.getElementById('whatsappUrl').value = d.whatsapp;
                    if (d.email) document.getElementById('emailUrl').value = d.email;
                } catch (e) {}
            }
        });
    </script>

</body>
</html>
